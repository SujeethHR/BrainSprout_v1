name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t brainsprout:${{ github.sha }} .

      - name: Start container
        run: |
          docker run -d \
            -e GROQ_API_KEY=dummy \
            -e AWS_ACCESS_KEY=dummy \
            -e AWS_SECRET_KEY=dummy \
            -e AWS_BUCKET_NAME=dummy \
            -e AWS_REGION=ap-south-1 \
            --name brainsprout-test \
            -p 8080:8080 \
            brainsprout:${{ github.sha }}

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080; then
              echo "App is ready"
              exit 0
            fi
            echo "Attempt $i/12 — waiting..."
            sleep 5
          done
          echo "App did not start in time"
          docker logs brainsprout-test
          exit 1

      - name: Smoke test — /query returns 400 on missing body
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/query \
            -H "Content-Type: application/json" \
            -d '{}')
          [ "$STATUS" = "400" ] || (echo "Expected 400, got $STATUS" && exit 1)

      - name: Print container logs
        if: always()
        run: docker logs brainsprout-test

      - name: Stop container
        if: always()
        run: docker rm -f brainsprout-test
